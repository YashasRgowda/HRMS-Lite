# Ruff linter configuration
# Docs: https://docs.astral.sh/ruff/

line-length = 100
target-version = "py313"

[lint]
# E = pycodestyle errors, F = pyflakes, I = isort, W = warnings
select = ["E", "F", "I", "W"]

ignore = [
  "E501",  # line too long — handled by formatter, not linter
]

[lint.per-file-ignores]
"app/models/__init__.py" = ["F401"]   # re-exports are intentional
"app/schemas/__init__.py" = ["F401"]  # re-exports are intentional
