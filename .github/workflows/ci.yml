name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Backend (FastAPI + Python)
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Lint & Import Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linter (ruff)
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Verify all imports resolve correctly
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms_db
        run: python -c "from app.main import app; print('✅ All imports OK')"

  # ─────────────────────────────────────────────
  # JOB 2 — Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Build production bundle
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
